version: '3.8'

services:
  hsm-backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: hsm-backend
    ports:
      - "8001:8000"
    environment:
      - PYTHONUNBUFFERED=1
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s
    volumes:
      - ./app:/app/app
      - ${HSM_BACKEND_PROPERTIES_FILE:-./hsm-backend.properties}:/app/hsm-backend.properties:ro
    networks:
      - hsm-network

  postgres:
    image: postgres:15
    container_name: hsm-backend-db
    restart: unless-stopped
    env_file:
      - ${HSM_BACKEND_PROPERTIES_FILE:-./hsm-backend.properties}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 5s
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ${HSM_BACKEND_PROPERTIES_FILE:-./hsm-backend.properties}:/app/hsm-backend.properties:ro
    networks:
      - hsm-network

volumes:
  pgdata:
    driver: local

networks:
  hsm-network:
    external: true
    name: hsm-network

