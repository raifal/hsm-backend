version: '3.8'

services:
  temperature-service:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: temperature-service
    ports:
      - "8000:8000"
    environment:
      - PYTHONUNBUFFERED=1
      - DB_HOST=${DB_HOST:-postgres}
      - DB_PORT=${DB_PORT:-5432}
      - DB_NAME=${DB_NAME:-hsm}
      - DB_USER=${DB_USER:-hsmuser}
      - DB_PASSWORD=${DB_PASSWORD:-hsmpassword}
    depends_on:
      - postgres
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s
    volumes:
      - ./app:/app/app
      - ${HSM_BACKEND_PROPERTIES_FILE:-./hsm-backend.properties}:/app/hsm-backend.properties:ro

  postgres:
    image: postgres:15
    container_name: hsm-backend-db
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-hsmuser}"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 5s
    environment:
      POSTGRES_USER: ${DB_USER:-hsmuser}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-hsmpassword}
      POSTGRES_DB: ${DB_NAME:-hsm}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
    driver: local